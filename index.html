<!DOCTYPE html><html lang="ar" dir="rtl"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>الحاسبة الاحترافية - العمليات والأقسام</title>    <!-- Font Awesome للأيقونات -->    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">    <style>        /* ---------- إعادة تعيين وتنسيقات عامة ---------- */        * {            margin: 0;            padding: 0;            box-sizing: border-box;            font-family: 'Segoe UI', 'Tahoma', sans-serif;        }        body {            background: linear-gradient(145deg, #f0f4f8 0%, #e9eef4 100%);            min-height: 100vh;            padding: 20px;            display: flex;            justify-content: center;            align-items: flex-start;        }        .app-container {            max-width: 1300px;            width: 100%;            background: rgba(255,255,255,0.85);            backdrop-filter: blur(15px);            -webkit-backdrop-filter: blur(15px);            border-radius: 40px;            box-shadow: 0 25px 50px -10px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.02);            overflow: hidden;            padding: 0 0 20px 0;            transition: all 0.2s ease;            border: 1px solid rgba(255,255,255,0.5);        }        /* ---------- شريط العنوان ---------- */        .app-header {            display: flex;            justify-content: space-between;            align-items: center;            padding: 20px 30px;            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);            color: white;            border-bottom: 1px solid rgba(255,255,255,0.1);        }        .app-header h1 {            font-size: 2rem;            font-weight: 700;            letter-spacing: -0.5px;            display: flex;            align-items: center;            gap: 12px;        }        .app-header h1 i {            background: rgba(255,255,255,0.15);            padding: 10px;            border-radius: 18px;            font-size: 1.6rem;        }        .user-area {            display: flex;            align-items: center;            gap: 20px;            background: rgba(0,0,0,0.2);            padding: 8px 18px;            border-radius: 60px;            backdrop-filter: blur(5px);        }        .user-id {            font-size: 1.2rem;            font-weight: 500;            display: flex;            align-items: center;            gap: 6px;        }        .user-id i {            font-size: 1.2rem;            opacity: 0.9;        }        .refresh-btn {            background: rgba(255,255,255,0.2);            border: none;            color: white;            font-size: 1.3rem;            width: 42px;            height: 42px;            border-radius: 30px;            display: flex;            align-items: center;            justify-content: center;            cursor: pointer;            transition: all 0.2s;            border: 1px solid rgba(255,255,255,0.1);        }        .refresh-btn:hover {            background: rgba(255,255,255,0.35);            transform: rotate(30deg);        }        /* ---------- منطقة المحتوى الرئيسية ---------- */        .main-content {            padding: 30px 30px 20px;        }        /* عرض الأقسام */        .sections-view {            display: block;        }        .view-header {            display: flex;            justify-content: space-between;            align-items: center;            margin-bottom: 30px;        }        .view-header h2 {            font-size: 2rem;            font-weight: 700;            color: #0f172a;            display: flex;            align-items: center;            gap: 12px;        }        .primary-btn, .danger-btn, .secondary-btn {            border: none;            padding: 12px 24px;            border-radius: 60px;            font-size: 1.1rem;            font-weight: 600;            display: inline-flex;            align-items: center;            gap: 10px;            cursor: pointer;            transition: all 0.15s;            box-shadow: 0 4px 8px rgba(0,0,0,0.05);            border: 1px solid rgba(255,255,255,0.3);        }        .primary-btn {            background: #4f46e5;            color: white;        }        .primary-btn:hover {            background: #4338ca;            transform: translateY(-2px);            box-shadow: 0 12px 20px -8px #4f46e550;        }        .secondary-btn {            background: #f1f5f9;            color: #1e293b;        }        .danger-btn {            background: #fee2e2;            color: #b91c1c;            border-color: #fecaca;        }        .danger-btn:hover {            background: #fecaca;        }        .icon-btn {            background: transparent;            border: none;            font-size: 1.2rem;            width: 40px;            height: 40px;            border-radius: 40px;            display: inline-flex;            align-items: center;            justify-content: center;            cursor: pointer;            color: #475569;            transition: background 0.1s;        }        .icon-btn:hover {            background: #e2e8f0;        }        /* شبكة الأقسام */        .sections-grid {            display: grid;            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));            gap: 24px;            margin-top: 10px;        }        .section-card {            background: white;            border-radius: 28px;            padding: 24px 22px;            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.02);            transition: transform 0.2s, box-shadow 0.2s;            cursor: pointer;            border: 1px solid rgba(255,255,255,0.8);            backdrop-filter: blur(5px);            display: flex;            flex-direction: column;            position: relative;        }        .section-card:hover {            transform: translateY(-6px);            box-shadow: 0 25px 35px -12px rgba(79, 70, 229, 0.2), 0 0 0 1px #c7d2fe;        }        .card-header {            display: flex;            align-items: center;            gap: 14px;            margin-bottom: 20px;        }        .section-icon {            font-size: 2.4rem;            line-height: 1;            background: #f8fafc;            width: 55px;            height: 55px;            display: flex;            align-items: center;            justify-content: center;            border-radius: 20px;            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);        }        .section-name {            font-size: 1.5rem;            font-weight: 700;            color: #0f172a;            flex: 1;        }        .pinned-badge {            color: #eab308;            font-size: 1.2rem;        }        .section-total {            font-size: 2.5rem;            font-weight: 800;            color: #4f46e5;            margin: 10px 0 5px;            line-height: 1.2;        }        .section-unit {            color: #64748b;            font-size: 1rem;            font-weight: 500;            margin-bottom: 15px;        }        .record-count {            color: #475569;            font-size: 0.95rem;            display: flex;            align-items: center;            gap: 5px;        }        .card-actions {            display: flex;            justify-content: flex-end;            gap: 8px;            margin-top: 15px;            border-top: 1px dashed #e2e8f0;            padding-top: 15px;        }        /* عرض التفاصيل */        .details-view {            display: block;        }        .details-header {            display: flex;            align-items: center;            gap: 20px;            margin-bottom: 25px;        }        .details-header h2 {            font-size: 2.2rem;            font-weight: 700;            color: #0f172a;        }        .back-btn {            background: white;            border: none;            padding: 12px 22px;            border-radius: 40px;            font-size: 1.2rem;            font-weight: 600;            color: #1e293b;            box-shadow: 0 5px 10px rgba(0,0,0,0.02);            border: 1px solid #e2e8f0;        }        .summary-panel {            background: linear-gradient(112deg, #ffffff 0%, #fafbff 100%);            border-radius: 30px;            padding: 20px 30px;            margin-bottom: 30px;            display: flex;            align-items: center;            gap: 40px;            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02), 0 10px 20px -10px rgba(0,0,0,0.05);            border: 1px solid #eef2ff;        }        .total-box {            display: flex;            align-items: baseline;            gap: 15px;        }        .total-label {            font-size: 1.4rem;            color: #334155;        }        .total-value {            font-size: 3rem;            font-weight: 800;            color: #4f46e5;        }        .count-box {            display: flex;            align-items: center;            gap: 8px;            font-size: 1.2rem;            color: #475569;        }        .add-record-form {            display: flex;            flex-wrap: wrap;            gap: 12px;            margin-bottom: 35px;            background: #f8fafc;            padding: 20px;            border-radius: 30px;        }        .add-record-form input, .add-record-form select {            padding: 16px 18px;            border: 1px solid #e2e8f0;            border-radius: 30px;            font-size: 1rem;            background: white;            flex: 1 1 160px;            outline: none;            transition: border 0.15s;        }        .add-record-form input:focus, .add-record-form select:focus {            border-color: #4f46e5;            box-shadow: 0 0 0 3px #4f46e520;        }        .records-list {            background: white;            border-radius: 28px;            padding: 10px 0;            box-shadow: 0 8px 20px rgba(0,0,0,0.02);            border: 1px solid #f1f5f9;        }        .record-row {            display: flex;            align-items: center;            padding: 16px 25px;            border-bottom: 1px solid #f1f5f9;            transition: background 0.1s;        }        .record-row:hover {            background: #faf9ff;        }        .record-op {            font-weight: 800;            font-size: 1.5rem;            width: 45px;            color: #4f46e5;        }        .record-num {            font-size: 1.5rem;            font-weight: 700;            margin: 0 15px;            min-width: 100px;            color: #0f172a;        }        .record-label {            background: #eef2ff;            padding: 5px 14px;            border-radius: 40px;            font-size: 0.9rem;            color: #4338ca;            margin-left: 15px;        }        .record-note {            color: #64748b;            margin-left: 15px;            font-style: italic;        }        .record-actions {            margin-right: auto;            display: flex;            gap: 5px;        }        /* المودال */        .modal-overlay {            position: fixed;            top: 0; left: 0; width: 100%; height: 100%;            background: rgba(15, 23, 42, 0.5);            backdrop-filter: blur(8px);            display: flex;            align-items: center;            justify-content: center;            z-index: 1000;            visibility: hidden;            opacity: 0;            transition: 0.2s;        }        .modal-overlay.active {            visibility: visible;            opacity: 1;        }        .modal {            background: white;            width: 90%;            max-width: 480px;            padding: 35px;            border-radius: 48px;            box-shadow: 0 30px 50px rgba(0,0,0,0.2);        }        .modal h3 {            font-size: 1.8rem;            margin-bottom: 25px;            color: #0f172a;        }        .modal input {            width: 100%;            padding: 18px;            border: 1px solid #e2e8f0;            border-radius: 30px;            margin-bottom: 20px;            font-size: 1rem;        }        .modal-actions {            display: flex;            justify-content: flex-end;            gap: 15px;            margin-top: 10px;        }        .hidden {            display: none !important;        }        .loading-placeholder {            text-align: center;            padding: 50px;            color: #64748b;        }        /* تجاوب */        @media (max-width: 700px) {            .app-container { padding: 0; }            .summary-panel { flex-direction: column; align-items: flex-start; }        }    </style></head><body><div class="app-container">    <!-- الهيدر -->    <header class="app-header">        <h1><i class="fas fa-cubes"></i> FlowCalc</h1>        <div class="user-area">            <div class="user-id"><i class="fas fa-id-card"></i> <span id="userIdDisplay">تحميل...</span></div>            <button class="refresh-btn" id="globalRefreshBtn" title="تحديث جميع البيانات"><i class="fas fa-arrows-rotate"></i></button>        </div>    </header>    <div class="main-content">        <!-- عرض الأقسام -->        <div id="sectionsView" class="sections-view">            <div class="view-header">                <h2><i class="fas fa-layer-group" style="color:#4f46e5;"></i> الأقسام</h2>                <button class="primary-btn" id="showAddSectionModalBtn"><i class="fas fa-plus-circle"></i> قسم جديد</button>            </div>            <div id="sectionsGridContainer" class="sections-grid">                <div class="loading-placeholder"><i class="fas fa-spinner fa-pulse"></i> جاري تحميل الأقسام...</div>            </div>        </div>        <!-- عرض تفاصيل القسم (مخفي بداية) -->        <div id="detailsView" class="details-view hidden">            <div class="details-header">                <button class="back-btn" id="backToSectionsBtn"><i class="fas fa-arrow-right"></i> العودة للأقسام</button>                <h2 id="currentSectionTitle">تفاصيل القسم</h2>                <div style="flex:1;"></div>                <button class="danger-btn" id="deleteSectionBtn"><i class="fas fa-trash-alt"></i> حذف القسم</button>                <button class="secondary-btn" id="clearSectionRecordsBtn"><i class="fas fa-eraser"></i> مسح العمليات</button>            </div>            <!-- ملخص سريع -->            <div class="summary-panel">                <div class="total-box">                    <span class="total-label"><i class="fas fa-wallet"></i> الإجمالي</span>                    <span class="total-value" id="sectionTotalDisplay">0</span>                </div>                <div class="count-box">                    <i class="fas fa-list-ul"></i>                    <span>عدد العمليات:</span>                    <strong id="sectionCountDisplay">0</strong>                </div>                <button class="icon-btn" id="refreshCurrentSectionBtn" style="margin-right:auto;"><i class="fas fa-sync-alt"></i></button>            </div>            <!-- نموذج إضافة سريعة -->            <div class="add-record-form">                <input type="number" id="recordNumInput" placeholder="الرقم" step="any" value="">                <select id="recordOpSelect">                    <option value="+">+</option>                    <option value="-">−</option>                    <option value="*">×</option>                    <option value="/">÷</option>                </select>                <input type="text" id="recordLabelInput" placeholder="تسمية (اختياري)">                <input type="text" id="recordNoteInput" placeholder="ملاحظة">                <button class="primary-btn" id="addRecordBtn"><i class="fas fa-plus"></i> إضافة</button>            </div>            <!-- قائمة العمليات -->            <div style="margin-top: 10px;">                <h3 style="margin-bottom: 15px; font-weight:600;"><i class="fas fa-history"></i> سجل العمليات</h3>                <div id="recordsListContainer" class="records-list">                    <div class="loading-placeholder">تحميل العمليات...</div>                </div>            </div>        </div>    </div></div><!-- مودال إضافة/تعديل قسم --><div class="modal-overlay" id="sectionModal">    <div class="modal">        <h3 id="modalTitle">قسم جديد</h3>        <input type="text" id="sectionNameInput" placeholder="اسم القسم" autocomplete="off">        <input type="text" id="sectionUnitInput" placeholder="الوحدة (مثال: ريال)">        <div style="display:flex; gap:10px;">            <input type="color" id="sectionColorInput" value="#4f46e5" style="flex:1;">            <input type="text" id="sectionIconInput" placeholder="أيقونة (📁)" value="📁" style="flex:2;">        </div>        <div class="modal-actions">            <button class="secondary-btn" id="cancelModalBtn">إلغاء</button>            <button class="primary-btn" id="saveSectionBtn">حفظ</button>        </div>    </div></div><script>    (function(){        "use strict";        // ---------- الإعدادات ----------        const API_BASE = 'https://your-api.onrender.com/api';  // <-- غير الرابط إلى API الخاص بك        let currentUserId = null;        let currentSection = null; // يحوي بيانات القسم الحالي        let sectionsData = [];        let autoRefreshTimer = null;        // عناصر DOM الأساسية        const sectionsView = document.getElementById('sectionsView');        const detailsView = document.getElementById('detailsView');        const sectionsGrid = document.getElementById('sectionsGridContainer');        const userIdDisplay = document.getElementById('userIdDisplay');        const sectionTotalDisplay = document.getElementById('sectionTotalDisplay');        const sectionCountDisplay = document.getElementById('sectionCountDisplay');        const recordsContainer = document.getElementById('recordsListContainer');        const currentSectionTitle = document.getElementById('currentSectionTitle');        // مودال        const modalOverlay = document.getElementById('sectionModal');        const modalTitle = document.getElementById('modalTitle');        const sectionNameInput = document.getElementById('sectionNameInput');        const sectionUnitInput = document.getElementById('sectionUnitInput');        const sectionColorInput = document.getElementById('sectionColorInput');        const sectionIconInput = document.getElementById('sectionIconInput');        const saveSectionBtn = document.getElementById('saveSectionBtn');        const cancelModalBtn = document.getElementById('cancelModalBtn');        const showAddSectionModalBtn = document.getElementById('showAddSectionModalBtn');        // ---------- تهيئة user_id ----------        function initUserId() {            let userId = localStorage.getItem('telegram_user_id');            if (!userId) {                const params = new URLSearchParams(window.location.search);                userId = params.get('user_id');                if (userId) localStorage.setItem('telegram_user_id', userId);                else {                    userId = prompt('👤 الرجاء إدخال معرف المستخدم (user_id) للمتابعة:');                    if (userId) localStorage.setItem('telegram_user_id', userId);                }            }            if (!userId) {                alert('لا يمكن المتابعة بدون معرف مستخدم.');                return null;            }            currentUserId = userId;            userIdDisplay.textContent = userId;            return userId;        }        // ---------- دوال API (مع async/await) ----------        async function apiCall(endpoint, method = 'GET', body = null) {            const headers = {                'Content-Type': 'application/json',                'X-Telegram-User-Id': currentUserId            };            const options = { method, headers };            if (body) options.body = JSON.stringify(body);            const res = await fetch(`${API_BASE}${endpoint}`, options);            if (!res.ok) {                const err = await res.json().catch(() => ({}));                throw new Error(err.error || `خطأ ${res.status}`);            }            return res.json();        }        // تحميل الأقسام مع المجاميع (include_summary=true)        async function fetchSections() {            const sections = await apiCall('/sections?include_summary=true');            sectionsData = sections;            return sections;        }        // تحميل ملخص قسم        async function fetchSectionSummary(sectionId) {            return apiCall(`/sections/${sectionId}/summary`);        }        // تحميل عمليات قسم        async function fetchRecords(sectionId) {            return apiCall(`/records?section_id=${sectionId}`);        }        // ---------- عرض الأقسام في الشبكة ----------        function renderSections(sections) {            if (!sections.length) {                sectionsGrid.innerHTML = `<div class="loading-placeholder">✨ لا توجد أقسام. أنشئ أول قسم.</div>`;                return;            }            let html = '';            sections.forEach(sec => {                const total = sec.total || 0;                const recordCount = sec.record_count || 0;                html += `                    <div class="section-card" data-section-id="${sec.id}" style="border-top: 6px solid ${sec.color || '#4f46e5'};">                        <div class="card-header">                            <span class="section-icon">${sec.icon || '📁'}</span>                            <span class="section-name">${sec.name}</span>                            ${sec.pinned ? '<i class="fas fa-thumbtack pinned-badge"></i>' : ''}                        </div>                        <div class="section-total">${formatNumber(total)} ${sec.unit || ''}</div>                        <div class="record-count"><i class="far fa-list-alt"></i> ${recordCount} عملية</div>                        <div class="card-actions">                            <button class="icon-btn pin-section-btn" data-id="${sec.id}" title="تثبيت"><i class="fas fa-thumbtack"></i></button>                        </div>                    </div>                `;            });            sectionsGrid.innerHTML = html;            // ربط الأحداث بالبطاقات            document.querySelectorAll('.section-card').forEach(card => {                card.addEventListener('click', (e) => {                    if (e.target.closest('button')) return;                    const id = card.dataset.sectionId;                    const section = sections.find(s => s.id === id);                    if (section) openSectionDetails(section);                });            });            document.querySelectorAll('.pin-section-btn').forEach(btn => {                btn.addEventListener('click', async (e) => {                    e.stopPropagation();                    const id = btn.dataset.id;                    await apiCall(`/sections/${id}/pin`, 'PATCH');                    await loadAndRenderSections();                });            });        }        async function loadAndRenderSections() {            try {                sectionsGrid.innerHTML = `<div class="loading-placeholder">تحميل...</div>`;                const sections = await fetchSections();                renderSections(sections);            } catch (e) {                sectionsGrid.innerHTML = `<div class="loading-placeholder" style="color:#b91c1c;">❌ فشل التحميل: ${e.message}</div>`;            }        }        // ---------- عرض تفاصيل قسم ----------        async function openSectionDetails(section) {            currentSection = section;            currentSectionTitle.innerHTML = `${section.icon || '📁'} ${section.name}`;            sectionsView.classList.add('hidden');            detailsView.classList.remove('hidden');            await refreshSectionDetails();        }        async function refreshSectionDetails() {            if (!currentSection) return;            try {                const [summary, records] = await Promise.all([                    fetchSectionSummary(currentSection.id),                    fetchRecords(currentSection.id)                ]);                sectionTotalDisplay.textContent = formatNumber(summary.total);                sectionCountDisplay.textContent = summary.count;                renderRecords(records);            } catch (e) {                recordsContainer.innerHTML = `<div class="loading-placeholder">❌ ${e.message}</div>`;            }        }        function renderRecords(records) {            if (!records.length) {                recordsContainer.innerHTML = `<div class="loading-placeholder">📭 لا توجد عمليات بعد</div>`;                return;            }            let html = '';            records.forEach(rec => {                html += `                    <div class="record-row" data-record-id="${rec.id}">                        <span class="record-op">${rec.op}</span>                        <span class="record-num">${formatNumber(rec.num)}</span>                        ${rec.label ? `<span class="record-label">${rec.label}</span>` : ''}                        ${rec.note ? `<span class="record-note">${rec.note}</span>` : ''}                        <div class="record-actions">                            <button class="icon-btn pin-record-btn" data-id="${rec.id}"><i class="fas fa-thumbtack"></i></button>                            <button class="icon-btn delete-record-btn" data-id="${rec.id}"><i class="fas fa-trash"></i></button>                        </div>                    </div>                `;            });            recordsContainer.innerHTML = html;            document.querySelectorAll('.pin-record-btn').forEach(btn => {                btn.addEventListener('click', async (e) => {                    const id = btn.dataset.id;                    await apiCall(`/records/${id}/pin`, 'PATCH');                    await refreshSectionDetails();                });            });            document.querySelectorAll('.delete-record-btn').forEach(btn => {                btn.addEventListener('click', async (e) => {                    if (!confirm('حذف العملية؟')) return;                    const id = btn.dataset.id;                    await apiCall(`/records/${id}`, 'DELETE');                    await refreshSectionDetails();                    await loadAndRenderSections(); // تحديث المجاميع في الخلفية                });            });        }        // تنسيق الأرقام        function formatNumber(n) {            return Number(n).toLocaleString('ar-EG', { maximumFractionDigits: 2 });        }        // ---------- الأحداث ----------        document.getElementById('backToSectionsBtn').addEventListener('click', () => {            detailsView.classList.add('hidden');            sectionsView.classList.remove('hidden');            currentSection = null;            loadAndRenderSections();        });        document.getElementById('globalRefreshBtn').addEventListener('click', () => {            if (currentSection) refreshSectionDetails();            loadAndRenderSections();        });        document.getElementById('refreshCurrentSectionBtn').addEventListener('click', () => {            if (currentSection) refreshSectionDetails();        });        // حذف القسم        document.getElementById('deleteSectionBtn').addEventListener('click', async () => {            if (!currentSection) return;            if (!confirm(`حذف قسم "${currentSection.name}" وجميع عملياته؟`)) return;            await apiCall(`/sections/${currentSection.id}`, 'DELETE');            detailsView.classList.add('hidden');            sectionsView.classList.remove('hidden');            currentSection = null;            await loadAndRenderSections();        });        // مسح العمليات        document.getElementById('clearSectionRecordsBtn').addEventListener('click', async () => {            if (!currentSection) return;            if (!confirm(`مسح جميع عمليات ${currentSection.name}؟`)) return;            await apiCall(`/sections/${currentSection.id}/clear`, 'DELETE');            await refreshSectionDetails();            await loadAndRenderSections();        });        // إضافة عملية        document.getElementById('addRecordBtn').addEventListener('click', async () => {            if (!currentSection) return;            const num = parseFloat(document.getElementById('recordNumInput').value);            if (isNaN(num)) { alert('الرجاء إدخال رقم'); return; }            const op = document.getElementById('recordOpSelect').value;            const label = document.getElementById('recordLabelInput').value.trim();            const note = document.getElementById('recordNoteInput').value.trim();            await apiCall('/records', 'POST', {                section_id: currentSection.id,                op, num, label, note            });            document.getElementById('recordNumInput').value = '';            document.getElementById('recordLabelInput').value = '';            document.getElementById('recordNoteInput').value = '';            await refreshSectionDetails();            await loadAndRenderSections();        });        // مودال القسم        showAddSectionModalBtn.addEventListener('click', () => {            modalTitle.textContent = 'قسم جديد';            sectionNameInput.value = '';            sectionUnitInput.value = '';            sectionColorInput.value = '#4f46e5';            sectionIconInput.value = '📁';            modalOverlay.classList.add('active');        });        cancelModalBtn.addEventListener('click', () => modalOverlay.classList.remove('active'));        saveSectionBtn.addEventListener('click', async () => {            const name = sectionNameInput.value.trim();            if (!name) { alert('اسم القسم مطلوب'); return; }            const data = {                name,                unit: sectionUnitInput.value,                color: sectionColorInput.value,                icon: sectionIconInput.value || '📁'            };            await apiCall('/sections', 'POST', data);            modalOverlay.classList.remove('active');            await loadAndRenderSections();        });        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('active'); });        // تحديث دوري كل 8 ثواني        function startAutoRefresh() {            if (autoRefreshTimer) clearInterval(autoRefreshTimer);            autoRefreshTimer = setInterval(async () => {                if (currentSection) {                    await refreshSectionDetails();                }                await loadAndRenderSections();            }, 8000);        }        // ---------- بدء التطبيق ----------        async function init() {            if (!initUserId()) return;            await loadAndRenderSections();            startAutoRefresh();        }        init();    })();</script></body></html>
